name: PR Preview · Teardown

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  teardown:
    runs-on: [self-hosted, kind-preview]
    steps:
      - uses: actions/checkout@v4

      - name: Tear down preview environment
        run: scripts/teardown-preview.sh "${{ github.event.pull_request.number }}"

      - name: Update the PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- pr-preview-bot -->";
            const body = [
              marker,
              "### 🧹 Preview environment torn down",
              "",
              `The ephemeral environment for this PR was removed (${new Date().toUTCString()}).`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

name: PR Preview · Deploy

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Cancel an in-flight deploy if a new commit lands on the same PR.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    # Self-hosted runner on a machine with kind + kubectl + docker.
    runs-on: [self-hosted, kind-preview]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview environment
        id: deploy
        run: |
          URL="$(scripts/deploy-preview.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.event.pull_request.head.ref }}")"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment the live URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const marker = "<!-- pr-preview-bot -->";
            const body = [
              marker,
              "### 🚀 Preview environment is live",
              "",
              `| | |`,
              `|---|---|`,
              `| **URL** | ${url} |`,
              `| **Commit** | \`${context.payload.pull_request.head.sha.slice(0,7)}\` |`,
              `| **Updated** | ${new Date().toUTCString()} |`,
              "",
              "_Auto-updates on every push. Torn down when this PR closes._",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
